<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChronosAuth Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    header span {
      font-size: 22px;
    }

    .tabs {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      transition: all 0.2s;
    }

    .tab.active {
      color: #e94560;
      border-bottom: 2px solid #e94560;
    }

    .panel {
      display: none;
      padding: 20px;
    }

    .panel.active { display: block; }

    /* QR Scanner panel */
    #qr-panel { text-align: center; }

    #camera-container {
      position: relative;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 16px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 1;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-box {
      width: 65%;
      height: 65%;
      border: 2px solid #e94560;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    }

    .scan-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #e94560;
      border-style: solid;
    }

    #scan-status {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }

    #scan-status.success { color: #4ecca3; }
    #scan-status.error   { color: #e94560; }

    #start-scan-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }

    #camera-canvas { display: none; }

    /* Manual entry panel */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #e94560;
    }

    input[type="text"]::placeholder { color: #555; }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .btn-primary {
      background: #e94560;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }

    .btn-primary:active { opacity: 0.85; }

    /* Accounts list */
    .accounts-section {
      padding: 20px;
      border-top: 1px solid #0f3460;
      margin-top: 20px;
    }

    .accounts-section h2 {
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #0f3460;
    }

    .account-name {
      font-size: 15px;
      font-weight: 500;
    }

    .account-delete {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .empty-accounts {
      text-align: center;
      color: #555;
      font-size: 14px;
      padding: 20px;
    }

    /* Preview code */
    .preview-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 14px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    .preview-box.visible { display: block; }

    .preview-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .preview-code {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #4ecca3;
      font-family: monospace;
    }

    .save-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-secondary {
      flex: 1;
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Done button */
    #done-btn {
      display: block;
      margin: 20px;
      background: #0f3460;
      color: #eee;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: calc(100% - 40px);
    }
  </style>
</head>
<body>

<header>
  <span>🔐</span>
  <h1>2FA Authenticator Setup</h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('qr')">📷 Scan QR</button>
  <button class="tab"        onclick="switchTab('manual')">⌨️ Manual Entry</button>
</div>

<!-- QR Scan Panel -->
<div id="qr-panel" class="panel active">
  <div id="camera-container" style="display:none">
    <video id="camera-video" autoplay playsinline muted></video>
    <div id="scan-overlay">
      <div class="scan-box"></div>
    </div>
  </div>
  <canvas id="camera-canvas"></canvas>
  <p id="scan-status">Scan Authenticator QR Code</p>
  <button id="start-scan-btn" onclick="startScan()">Camera</button>

  <div id="qr-preview" class="preview-box">
    <div class="preview-label">Account found</div>
    <div id="qr-account-name" style="font-size:16px; font-weight:600; margin-bottom:8px;"></div>
    <div class="preview-label">Test code</div>
    <div class="preview-code" id="qr-code-preview">------</div>
    <div class="save-row">
      <button class="btn-secondary" onclick="cancelQR()">Cancel</button>
      <button class="btn-primary" style="margin-top:0" onclick="saveQRAccount()">Save to Watch</button>
    </div>
  </div>
</div>

<!-- Manual Entry Panel -->
<div id="manual-panel" class="panel">
  <div class="form-group">
    <label>Account Name</label>
    <input type="text" id="manual-name" placeholder="e.g. GitHub, Google, Discord">
  </div>
  <div class="form-group">
    <label>Secret Key</label>
    <input type="text" id="manual-secret" placeholder="e.g. JBSWY3DPEHPK3PXP" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <div class="hint">Found under "Can't scan?" on setup pages. Letters and numbers only.</div>
  </div>

  <div id="manual-preview" class="preview-box">
    <div class="preview-label">Current code (verify this matches)</div>
    <div class="preview-code" id="manual-code-preview">------</div>
  </div>

  <button class="btn-primary" onclick="previewManual()">Preview Code</button>
  <button class="btn-primary" id="save-manual-btn" style="display:none; background:#4ecca3; color:#1a1a2e; margin-top:8px;" onclick="saveManualAccount()">✓ Save to Watch</button>
</div>

<!-- Saved Accounts -->
<div class="accounts-section">
  <h2>Saved Accounts</h2>
  <div id="accounts-list"></div>
</div>

<button id="done-btn" onclick="doneAndClose()">Done — Return to Watch</button>

<script>
// ---- Storage ----
function loadAccounts() {
  var raw = localStorage.getItem('accounts');
  return raw ? JSON.parse(raw) : [];
}
function saveAccounts(accs) {
  localStorage.setItem('accounts', JSON.stringify(accs));
}

// ---- Tab switching ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && tab === 'qr') || (i === 1 && tab === 'manual'));
  });
  document.getElementById('qr-panel').classList.toggle('active', tab === 'qr');
  document.getElementById('manual-panel').classList.toggle('active', tab === 'manual');
  if (tab !== 'qr') stopScan();
}

// ---- Base32 + TOTP (same logic as app.js) ----
function base32Decode(base32) {
  var alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  var bits = 0, value = 0, output = [];
  base32 = base32.toUpperCase().replace(/=+$/, '').replace(/\s/g, '');
  for (var i = 0; i < base32.length; i++) {
    var idx = alphabet.indexOf(base32[i]);
    if (idx === -1) continue;
    value = (value << 5) | idx;
    bits += 5;
    if (bits >= 8) { output.push((value >>> (bits - 8)) & 255); bits -= 8; }
  }
  return output;
}

function rotl(n, s) { return ((n << s) | (n >>> (32 - s))) >>> 0; }

function sha1(bytes) {
  var H0=0x67452301, H1=0xEFCDAB89, H2=0x98BADCFE, H3=0x10325476, H4=0xC3D2E1F0;
  var msg = bytes.slice(), origLen = msg.length;
  msg.push(0x80);
  while (msg.length % 64 !== 56) msg.push(0);
  var bitLen = origLen * 8;
  msg.push(0,0,0,0,(bitLen>>>24)&0xff,(bitLen>>>16)&0xff,(bitLen>>>8)&0xff,bitLen&0xff);
  for (var chunk = 0; chunk < msg.length; chunk += 64) {
    var W = [];
    for (var t = 0; t < 16; t++) {
      W[t] = ((msg[chunk+t*4]<<24)|(msg[chunk+t*4+1]<<16)|(msg[chunk+t*4+2]<<8)|msg[chunk+t*4+3])>>>0;
    }
    for (var t = 16; t < 80; t++) W[t] = rotl(W[t-3]^W[t-8]^W[t-14]^W[t-16],1);
    var a=H0,b=H1,c=H2,d=H3,e=H4;
    for (var t = 0; t < 80; t++) {
      var f,k;
      if(t<20){f=((b&c)|(~b&d))>>>0;k=0x5A827999;}
      else if(t<40){f=(b^c^d)>>>0;k=0x6ED9EBA1;}
      else if(t<60){f=((b&c)|(b&d)|(c&d))>>>0;k=0x8F1BBCDC;}
      else{f=(b^c^d)>>>0;k=0xCA62C1D6;}
      var temp=(rotl(a,5)+f+e+k+W[t])>>>0;
      e=d;d=c;c=rotl(b,30);b=a;a=temp;
    }
    H0=(H0+a)>>>0;H1=(H1+b)>>>0;H2=(H2+c)>>>0;H3=(H3+d)>>>0;H4=(H4+e)>>>0;
  }
  return [H0,H1,H2,H3,H4];
}

function hmacSha1(keyBytes, msgBytes) {
  if (keyBytes.length > 64) {
    var h = sha1(keyBytes); keyBytes = [];
    for (var i=0;i<5;i++){keyBytes.push((h[i]>>>24)&0xff,(h[i]>>>16)&0xff,(h[i]>>>8)&0xff,h[i]&0xff);}
  }
  while (keyBytes.length < 64) keyBytes.push(0);
  var iPad=[], oPad=[];
  for (var i=0;i<64;i++){iPad.push(keyBytes[i]^0x36);oPad.push(keyBytes[i]^0x5C);}
  var inner = sha1(iPad.concat(msgBytes)), innerBytes=[];
  for (var i=0;i<5;i++){innerBytes.push((inner[i]>>>24)&0xff,(inner[i]>>>16)&0xff,(inner[i]>>>8)&0xff,inner[i]&0xff);}
  return sha1(oPad.concat(innerBytes));
}

function generateTOTP(secret) {
  var keyBytes = base32Decode(secret);
  var timeStep = Math.floor(Date.now() / 1000 / 30);
  var msgBytes = [0,0,0,0,(timeStep>>>24)&0xff,(timeStep>>>16)&0xff,(timeStep>>>8)&0xff,timeStep&0xff];
  var hashWords = hmacSha1(keyBytes, msgBytes);
  var hashBytes = [];
  for (var i=0;i<5;i++){hashBytes.push((hashWords[i]>>>24)&0xff,(hashWords[i]>>>16)&0xff,(hashWords[i]>>>8)&0xff,hashWords[i]&0xff);}
  var offset = hashBytes[19] & 0x0f;
  var binCode = ((hashBytes[offset]&0x7f)<<24)|((hashBytes[offset+1]&0xff)<<16)|((hashBytes[offset+2]&0xff)<<8)|(hashBytes[offset+3]&0xff);
  var otp = (binCode % 1000000).toString();
  while (otp.length < 6) otp = '0' + otp;
  return otp;
}

// ---- QR Scanner ----
var videoStream = null;
var scanLoop = null;
var pendingQRAccount = null;

function startScan() {
  var container = document.getElementById('camera-container');
  var video = document.getElementById('camera-video');
  var btn = document.getElementById('start-scan-btn');
  var status = document.getElementById('scan-status');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    status.textContent = 'Camera not available in this browser.';
    status.className = 'error';
    return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(function(stream) {
      videoStream = stream;
      video.srcObject = stream;
      container.style.display = 'block';
      btn.textContent = 'Stop Camera';
      btn.onclick = stopScan;
      status.textContent = 'Scanning... scan a 2FA QR code';
      status.className = '';
      scanLoop = setInterval(scanFrame, 200);
    })
    .catch(function(err) {
      status.textContent = 'Camera access denied. Use Manual Entry instead.';
      status.className = 'error';
    });
}

function stopScan() {
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  if (videoStream) { videoStream.getTracks().forEach(function(t){t.stop();}); videoStream = null; }
  document.getElementById('camera-container').style.display = 'none';
  document.getElementById('start-scan-btn').textContent = 'Start Camera';
  document.getElementById('start-scan-btn').onclick = startScan;
}

function scanFrame() {
  var video = document.getElementById('camera-video');
  var canvas = document.getElementById('camera-canvas');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var code = jsQR(imageData.data, imageData.width, imageData.height);

  if (code && code.data) {
    parseOTPAuth(code.data);
  }
}

function parseOTPAuth(uri) {
  // Format: otpauth://totp/LABEL?secret=SECRET&issuer=ISSUER
  if (!uri.startsWith('otpauth://totp/')) {
    document.getElementById('scan-status').textContent = 'Not a valid 2FA QR code. Try again.';
    document.getElementById('scan-status').className = 'error';
    return;
  }

  stopScan();

  try {
    var withoutScheme = uri.replace('otpauth://totp/', '');
    var parts = withoutScheme.split('?');
    var label = decodeURIComponent(parts[0]);
    var params = {};
    parts[1].split('&').forEach(function(p) {
      var kv = p.split('=');
      params[kv[0]] = kv[1];
    });

    var secret = params.secret;
    // Clean up label: "issuer:account" -> "account" or just use issuer
    var name = label.includes(':') ? label.split(':')[1].trim() : label;
    if (params.issuer) name = decodeURIComponent(params.issuer) + ' (' + name + ')';

    // Preview
    var code = generateTOTP(secret);
    pendingQRAccount = { name: name, secret: secret };

    document.getElementById('qr-account-name').textContent = name;
    document.getElementById('qr-code-preview').textContent = code;
    document.getElementById('qr-preview').classList.add('visible');
    document.getElementById('scan-status').textContent = 'QR code scanned successfully!';
    document.getElementById('scan-status').className = 'success';

  } catch(e) {
    document.getElementById('scan-status').textContent = 'Failed to parse QR code.';
    document.getElementById('scan-status').className = 'error';
  }
}

function cancelQR() {
  pendingQRAccount = null;
  document.getElementById('qr-preview').classList.remove('visible');
  document.getElementById('scan-status').textContent = 'Point your camera at an authenticator QR code';
  document.getElementById('scan-status').className = '';
}

function saveQRAccount() {
  if (!pendingQRAccount) return;
  var accounts = loadAccounts();
  accounts.push(pendingQRAccount);
  saveAccounts(accounts);
  pendingQRAccount = null;
  document.getElementById('qr-preview').classList.remove('visible');
  document.getElementById('scan-status').textContent = 'Account saved! Scan another or tap Done.';
  document.getElementById('scan-status').className = 'success';
  renderAccounts();
}

// ---- Manual Entry ----
function previewManual() {
  var name = document.getElementById('manual-name').value.trim();
  var secret = document.getElementById('manual-secret').value.trim().toUpperCase().replace(/\s/g, '');

  if (!name) { alert('Please enter an account name.'); return; }
  if (!secret || secret.length < 8) { alert('Secret key looks too short. Check and try again.'); return; }

  try {
    var code = generateTOTP(secret);
    document.getElementById('manual-code-preview').textContent = code;
    document.getElementById('manual-preview').classList.add('visible');
    document.getElementById('save-manual-btn').style.display = 'block';
  } catch(e) {
    alert('Invalid secret key. Make sure you copied it correctly.');
  }
}

function saveManualAccount() {
  var name = document.getElementById('manual-name').value.trim();
  var secret = document.getElementById('manual-secret').value.trim().toUpperCase().replace(/\s/g, '');
  var accounts = loadAccounts();
  accounts.push({ name: name, secret: secret });
  saveAccounts(accounts);
  document.getElementById('manual-name').value = '';
  document.getElementById('manual-secret').value = '';
  document.getElementById('manual-preview').classList.remove('visible');
  document.getElementById('save-manual-btn').style.display = 'none';
  renderAccounts();
  switchTab('qr');
}

// ---- Accounts list ----
function renderAccounts() {
  var accounts = loadAccounts();
  var list = document.getElementById('accounts-list');
  if (accounts.length === 0) {
    list.innerHTML = '<div class="empty-accounts">No accounts saved yet.<br>Add one above.</div>';
    return;
  }
  list.innerHTML = accounts.map(function(acc, i) {
    return '<div class="account-item">' +
      '<span class="account-name">🔑 ' + escHtml(acc.name) + '</span>' +
      '<button class="account-delete" onclick="deleteAccount(' + i + ')">Remove</button>' +
    '</div>';
  }).join('');
}

function deleteAccount(index) {
  if (!confirm('Remove this account?')) return;
  var accounts = loadAccounts();
  accounts.splice(index, 1);
  saveAccounts(accounts);
  renderAccounts();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- Done ----
function doneAndClose() {
  var returnVal = JSON.stringify({ action: 'saved' });
  var location = 'pebblejs://close#' + encodeURIComponent(returnVal);
  document.location = location;
}

// ---- Init ----
renderAccounts();
</script>
</body>
</html>
